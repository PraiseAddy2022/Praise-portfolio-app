name: My first Pipeline

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout codes
        uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/ciportfolio .
      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_Password }}
        
      -   name: pusg image to registry
          run:  docker push ${{secrets.DOCKER_USERNAME}}/ciportfolio  
