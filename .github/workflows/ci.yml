name: My first Pipeline

on:
  push:

jobs:
  build:  
    runs-on: ubuntu-latest
    steps:
        - name: checkout code
          uses: actions/checkout@v6
        - name: build image
          run: |
             docker build -t ${{secrets.DOCKER_USERNAME}}/myprofile:${{github.run_number}} .
             docker build -t ${{secrets.DOCKER_USERNAME}}/myprofile .
        - name: Doccker login
          uses:  docker/login-action@v4
          with:
           username: ${{ secrets.DOCKER_USERNAME }}
           password: ${{ secrets.DOCKER_PASSWORD}}
        
        - name: Push image to registry
          run: |
           docker push ${{secrets.DOCKER_USERNAME}}/myprofile:${{github.run_number}} 
           docker push ${{secrets.DOCKER_USERNAME}}/myprofile
 
  deploy:
      needs: build
      runs-on: ubuntu-latest
      steps:
        - name: ssh to linux and run container
          uses: appleboy/ssh-action@v1
          with:
            host: ${{ secrets.HOST }}
            username: ${{ secrets.SSH_USERNAME }}
            key: ${{ secrets.PRIVATE_KEY}}
            script: |
              docker rm -f myprofile || echo " container not fornd, skip removal ."
              docker run -d --name profile -p 8080:80 ${{secrets.DOCKER_USERNAME}}/myprofile
      